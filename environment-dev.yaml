name: mailjet-dev
channels:
  - defaults
  - conda-forge
dependencies:
  - python >=3.10
  # build & host deps
  - pip
  - setuptools-scm
  # PyPI publishing only (modern PEP 517 package builder)
  - python-build
  # runtime deps
  - requests >=2.33.0
  - typing-extensions>=4.7.1  # [py<311]
  # tests
  - pyfakefs
  - coverage >=4.5.4
  - pytest >=9.0.3
  - pytest-benchmark
  - pytest-cov
  - pytest-xdist
  # linters, formatters & typing (Aligned with pre-commit-config.yaml)
  - mypy
  - pyright
  - ruff
  - types-requests
  # other
  - conda
  - conda-build
  - jsonschema
  - pre-commit
  - python-dotenv >=1.2.2
  - types-jsonschema
  - pip:
      - bandit
      - scalene >=1.3.16
      - snakeviz
      - typos
      - vulture
      # PyPI publishing only
      - twine
