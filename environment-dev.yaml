---
name: mailjet-dev
channels:
  - defaults
  - conda-forge
dependencies:
  - python >=3.10
  # build & host deps
  - pip
  - setuptools-scm
  # PyPI publishing only (modern PEP 517 package builder)
  - python-build
  # runtime deps
  - requests >=2.32.5
  # tests
  - pyfakefs
  - coverage >=4.5.4
  - pytest
  - pytest-benchmark
  - pytest-cov
  - pytest-xdist
  # linters, formatters & typing (Aligned with pre-commit-config.yaml)
  - black
  - darker
  - flake8
  - flake8-bugbear
  - flake8-comprehensions
  - flake8-docstrings
  - flake8-pyproject
  - flake8-tidy-imports
  - mypy
  - pycodestyle
  - pydocstyle
  - pylint
  - pyright
  - radon
  - ruff
  - toml
  - types-requests
  # other
  - conda
  - conda-build
  - jsonschema
  - pre-commit
  - python-dotenv >=0.19.2
  - types-jsonschema
  - pip:
      - autoflake
      - bandit
      - pyupgrade
      - refurb
      - scalene >=1.3.16
      - snakeviz
      - typos
      - vulture
      # PyPI publishing only
      - twine
